[camera]
index = 0
width = 1280
height = 720
fps = 30

[detection]
motion_timeout_sec = 30
min_contour_area = 500
mog2_history = 500
mog2_var_threshold = 50
debounce_frames = 5
warmup_frames = 100
ignore_zones = 0.4789,0.0000,0.5031,0.7361 ; 0.4781,0.6903,0.6617,0.7431
